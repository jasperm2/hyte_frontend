<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta
      name="description"
      content="On tärkeää että pidät huolta itsestäsi. Seuraa treeniohjeitamme, tarkastele terveyttäsi
      HRV tiedon avulla ja voi kokonaisvaltaisesti hyvin. Suuntaa nyt hyvinvointia ja uutta
      elämääsi kohti."
    />

    <title>HyteGym</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;1,300&family=Roboto+Slab:wght@100;200;300;400;500;600;700;900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>

    <nav>
      <ul>
        <li><a href="#" id="logo">HyteGym</a></li>
        <li>
          <a href="index.html" class="navlink">Koti</a>
        </li>
        <li>
          <a href="bmi.html" class="navlink">BMI laskuri</a>
        </li>
        <li>
          <a href="#" class="selected navlink">Päiväkirja</a>
        </li>
      </ul>
      <div class="nav-right">
        Hei Käyttäjä: <span class="username">Vieras</span>
        <a href="#" id="auth-btn" class="login-btn">Kirjaudu sisään</a>
      </div>
    </nav>

    <main>
      <h2>Tänne päiväkirjahaut</h2>
      <button class="get_entries">Hae päiväkirjamerkinnät</button>

      <button id="addEntryBtn">Add diary entry</button>

    <form id="entryForm" style="display:none;">
      <input type="date" id="entry_date" required>

      <input type="text" id="mood" placeholder="Mood">

      <input type="number" id="weight" placeholder="Weight">

      <input type="number" id="sleep_hours" placeholder="Sleep hours">

      <textarea id="notes" placeholder="Notes"></textarea>

      <button type="submit">Save entry</button>
    </form>

    <div id="entriesContainer"></div>

    <!-- Flexbox pohja johon kortit luodaan -->
      <section class="diary-card-area">
        <div class="card">
          <h2>Otsikko</h2>
          <p>Teksti</p>
        </div>
        <div class="card">
          <h2>Otsikko</h2>
          <p>Teksti</p>
        </div>
        <div class="card">
          <h2>Otsikko</h2>
          <p>Teksti</p>
        </div>
        <div class="card">
          <h2>Otsikko</h2>
          <p>Teksti</p>
        </div>
      </section>

      <dialog class="diary_dialog">
        <h2>Tässä on dialogi</h2>
        <p>Tänne voi avata ja muokata tietoa vaikka formissa</p>
        <div class="diary_id">ID</div>
        <button autofocus>Close</button>
    </dialog>

    </main>
    <footer>
      <p>Copyright, Meitsi</p>
    </footer>

  </body>
  <script type="module" src="/src/js/diary.js"></script>
  <script type="module" src="/src/js/loggedUser.js"></script>
  <script type="module" src="/src/js/main.js"></script>
</html>

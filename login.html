<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>MedCheck</title>

<link rel="stylesheet" href="src/css/style.css">

</head>

<body>

<div class="login-page">

<div class="login-card">

<h1>MedCheck</h1>

<div class="login-tabs">
<button id="loginTab" class="active">Kirjaudu</button>
<button id="registerTab">Rekisteröidy</button>
</div>

<!-- LOGIN -->

<form id="loginForm">

<input type="text" id="loginUsername" placeholder="Käyttäjänimi" required>

<input type="password" id="loginPassword" placeholder="Salasana" required>

<button type="submit" id="ksis">Kirjaudu sisään</button>

</form>

<!-- REGISTER -->

<form id="registerForm" class="hidden">

<input type="text" id="registerUsername" placeholder="Käyttäjänimi" required>

<input type="email" id="registerEmail" placeholder="Sähköposti" required>

<input type="password" id="registerPassword" placeholder="Salasana" required>

<button type="submit">Rekisteröidy</button>

</form>

<p id="authError"></p>

</div>

</div>

<script src="src/js/auth.js"></script>

</body>
</html>
